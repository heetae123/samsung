<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품 상세 정보 | SAMSUNG Systec</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-shield-halved"></i> <span>SAMSUNG</span> Systec
      </a>
      <nav class="gnb">
        <ul>
          <li><a href="contact.html">회사소개</a></li>
          <li><a href="room.html">객실관리시스템</a></li>
          <li><a href="cctv.html">CCTV시스템</a></li>
          <li><a href="portfolio.html">포트폴리오</a></li>
          <li><a href="community.html">커뮤니티</a></li>
          <li><a href="support.html">고객지원</a></li>
        </ul>
      </nav>
      <div class="header-util">
        <a href="login.html" class="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i> 로그인
        </a>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 60px 20px;">
    <div style="max-width: 900px; margin: 0 auto; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1);">
      <a href="javascript:history.back()" style="display: inline-block; margin-bottom: 30px; color: var(--primary); font-weight: 600; font-size: 15px;">
        <i class="fa-solid fa-arrow-left"></i> 뒤로가기
      </a>
      
      <div style="display: flex; flex-direction: column; gap: 40px;">
        <!-- Product Header -->
        <div>
          <h1 id="productTitle" style="font-size: 36px; color: var(--text-dark); margin-bottom: 15px; font-weight: 800;">제품명</h1>
          <p id="productIntro" style="font-size: 18px; color: #666; line-height: 1.6;">제품 소개 내용이 들어갑니다.</p>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee;">

        <!-- Price and Inquiry Section -->
        <div style="background: #fdfdfd; padding: 40px; border-radius: 15px; border: 1px solid #f0f0f0;">
          <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px;">
            <div>
              <h3 style="margin-bottom: 15px; font-size: 20px; color: var(--text-dark);"><i class="fa-solid fa-wallet" style="color: var(--primary);"></i> 판매 가격</h3>
              <div id="priceDisplay">
                <!-- 가격 정보가 동적으로 삽입됨 -->
              </div>
            </div>
            <div id="inquirySection">
              <!-- 로그인 시 견적문의 버튼 표시 -->
            </div>
          </div>
        </div>

        <!-- Usage Section -->
        <div>
          <h3 style="margin-bottom: 25px; font-size: 22px; color: var(--text-dark);"><i class="fa-solid fa-screwdriver-wrench" style="color: var(--primary);"></i> 제품 사용법 및 매뉴얼</h3>
          <p id="productUsage" style="margin-bottom: 20px; color: #555;">사용법에 대한 설명이 들어갑니다.</p>
          
          <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
            <iframe id="videoFrame" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <p style="margin-top: 20px; color: #888; font-size: 14px; background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary);">
            <i class="fa-solid fa-circle-info"></i> 설치 중 궁금하신 사항은 고객센터(050-5829-7001)로 문의주시기 바랍니다.
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer style="margin-top: 100px;">
    <div class="container">
      <div class="footer-bottom">
        <p>Copyright 2024 SAMSUNG SYSTEC. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || '제품 정보';
      const price = params.get('price') || '상담 문의';
      const discount = params.get('discount') || '상담 문의';
      const videoId = params.get('video') || 'dQw4w9WgXcQ';
      const intro = params.get('intro') || '제품의 상세한 소개 정보가 준비 중입니다.';
      const usage = params.get('usage') || '제품 사용법 및 매뉴얼은 아래 가이드를 참고해 주세요.';

      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

      document.getElementById('productTitle').textContent = title;
      document.getElementById('productIntro').textContent = intro;
      document.getElementById('productUsage').textContent = usage;
      
      const priceDisplay = document.getElementById('priceDisplay');
      const videoFrame = document.getElementById('videoFrame');
      const inquirySection = document.getElementById('inquirySection');

      // 비디오 설정
      videoFrame.src = `https://www.youtube.com/embed/${videoId}`;

      if (isLoggedIn) {
        priceDisplay.innerHTML = `
          <p style="font-size: 18px; color: #999; text-decoration: line-through; margin-bottom: 5px;">정상가: ${price}원</p>
          <p style="font-size: 32px; color: var(--primary); font-weight: 800;">회원 할인가: ${discount}원</p>
          <p style="color: var(--primary); font-size: 14px; margin-top: 5px; font-weight: 500;"><i class="fa-solid fa-star"></i> 특별 혜택 가격 적용 중</p>
        `;
        
        inquirySection.innerHTML = `
          <a href="contact.html?subject=${encodeURIComponent(title + ' 견적 문의')}" style="display: inline-block; padding: 15px 35px; background: var(--text-dark); color: white; border-radius: 10px; font-weight: 700; font-size: 16px; transition: 0.3s; text-align: center;">
            <i class="fa-solid fa-file-invoice-dollar"></i> 실시간 견적 문의하기
          </a>
        `;
      } else {
        priceDisplay.innerHTML = `
          <p style="font-size: 32px; color: var(--text-dark); font-weight: 800;">판매가: ${price}원</p>
          <p style="margin-top: 10px; font-size: 15px; color: #777;">
            <a href="login.html" style="color: var(--primary); text-decoration: underline; font-weight: 600;">로그인</a>하시면 할인된 가격과 견적 문의가 가능합니다.
          </p>
        `;
      }
    });
  </script>
</body>
</html>
