<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품 상세 정보 | SAMSUNG Systec</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-shield-halved"></i> <span>SAMSUNG</span> Systec
      </a>
      <nav class="gnb">
        <ul>
          <li><a href="contact.html">회사소개</a></li>
          <li><a href="room.html">객실관리시스템</a></li>
          <li><a href="cctv.html">CCTV시스템</a></li>
          <li><a href="portfolio.html">포트폴리오</a></li>
          <li><a href="community.html">커뮤니티</a></li>
          <li><a href="support.html">고객지원</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 60px 20px;">
    <div style="max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
      <a href="javascript:history.back()" style="display: inline-block; margin-bottom: 20px; color: var(--primary); font-weight: 600;">
        <i class="fa-solid fa-arrow-left"></i> 뒤로가기
      </a>
      
      <h1 id="productTitle" style="font-size: 32px; color: var(--text-dark); margin-bottom: 30px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; display: inline-block;">제품명</h1>
      
      <div style="background: #f8f9fa; padding: 30px; border-radius: 12px; margin-bottom: 40px;">
        <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-tag"></i> 가격 정보</h3>
        <div id="priceDisplay">
          <!-- 가격이 여기에 표시됩니다 -->
        </div>
      </div>

      <div style="margin-bottom: 40px;">
        <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-circle-play"></i> 설치 방법 매뉴얼 (동영상)</h3>
        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000;">
          <iframe id="videoFrame" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <p style="margin-top: 15px; color: #666; font-size: 14px;">※ 설치 중 궁금하신 사항은 고객센터(050-5829-7001)로 문의주시기 바랍니다.</p>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || '제품 정보';
      const price = params.get('price') || '상담 문의';
      const discount = params.get('discount') || '상담 문의';
      const videoId = params.get('video') || 'dQw4w9WgXcQ'; // 기본값 (유튜브 ID)

      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

      document.getElementById('productTitle').textContent = title;
      const priceDisplay = document.getElementById('priceDisplay');
      const videoFrame = document.getElementById('videoFrame');

      // 유튜브 URL 설정 (ID만 넘겨받는 경우를 가정)
      videoFrame.src = `https://www.youtube.com/embed/${videoId}`;

      if (isLoggedIn) {
        priceDisplay.innerHTML = `
          <p style="font-size: 18px; color: #999; text-decoration: line-through; margin-bottom: 5px;">정상가: ${price}원</p>
          <p style="font-size: 26px; color: var(--primary); font-weight: 800;">회원 할인가: ${discount}원</p>
          <p style="color: var(--primary); font-size: 14px; margin-top: 10px;">✨ 회원님께 드리는 특별 혜택 가격입니다.</p>
        `;
      } else {
        priceDisplay.innerHTML = `
          <p style="font-size: 26px; color: var(--text-dark); font-weight: 800;">판매가: ${price}원</p>
          <p style="margin-top: 10px; font-size: 15px;">
            <a href="login.html" style="color: var(--primary); text-decoration: underline; font-weight: 600;">로그인</a>하시면 할인된 가격을 보실 수 있습니다.
          </p>
        `;
      }
    });
  </script>
</body>
</html>
