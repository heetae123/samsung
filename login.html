<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | SAMSUNG Systec</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: var(--bg-light); display:flex; flex-direction:column; min-height:100vh; }
    .login-container { flex: 1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .login-card { background:white; padding:50px; border-radius:16px; box-shadow:var(--shadow-lg); width:100%; max-width:450px; text-align:center; }
    .login-card .logo { justify-content:center; margin-bottom:30px; font-size:32px; }
    .login-card p { color:var(--text-muted); margin-bottom:30px; }
    .login-card .form-group { margin-bottom:20px; }
    .login-card input { padding:15px; font-size:15px; }
    .login-card .btn-primary { padding:15px; font-size:16px; margin-top:10px; }
    .util-links { display:flex; justify-content:center; gap:20px; margin-top:25px; font-size:14px; color:var(--text-normal); }
    .util-links a:hover { color:var(--primary); }
  </style>
</head>
<body>

  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-shield-halved"></i> <span>SAMSUNG</span> Systec
      </a>
      <a href="index.html" class="btn-more"><i class="fa-solid fa-house"></i> 메인으로 돌아가기</a>
    </div>
  </header>

  <div class="login-container">
    <div class="login-card">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-shield-halved"></i> <span>SAMSUNG</span> Systec
      </a>
      <p>서비스 이용을 위해 로그인을 해주세요.</p>
      
      <form id="loginForm">
        <div class="form-group">
          <input type="text" placeholder="아이디(이메일)" required>
        </div>
        <div class="form-group">
          <input type="password" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>

      <div class="util-links">
        <a href="#">회원가입</a>
        <a href="#">아이디 찾기</a>
        <a href="#">비밀번호 찾기</a>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // 가상 로그인 성공 처리
      localStorage.setItem('isLoggedIn', 'true');
      alert('성공적으로 로그인되었습니다.');
      location.href = 'index.html';
    });
  </script>
</body>
</html>
